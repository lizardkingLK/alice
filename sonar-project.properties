# SonarCloud — monorepo analysis configuration
# https://docs.sonarsource.com/sonarqube-cloud

sonar.organization=lizardkinglk
sonar.projectKey=lizardkingLK_alice

# Scope
sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Noise reduction (generated, build output, vendor)
sonar.exclusions=\
**/node_modules/**,\
**/.next/**,\
**/dist/**,\
**/coverage/**,\
**/generated/**,\
**/prisma/migrations/**,\
**/.turbo/**,\
**/pnpm-lock.yaml

# Coverage disabled until Vitest LCOV is wired in CI
sonar.coverage.exclusions=**/*

# TypeScript / JavaScript monorepo
sonar.javascript.node.maxspace=4096
